upstream backend_upstream {
    server backend:80;
}

upstream frontend_upstream {
    server frontend:80;
}

upstream landing_upstream {
    server landing:80;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    # ─── API → Backend (CodeIgniter 4 PHP-FPM) ───────────────────────
    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ─── Frontend SPA → React app (served at /app/) ──────────────────
    # Trailing slash on proxy_pass strips the /app/ prefix so the frontend
    # nginx receives / instead of /app/ (assets are at root of dist/)
    location /app/ {
        proxy_pass http://frontend_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Landing page → static HTML (served at /) ────────────────────
    location / {
        proxy_pass http://landing_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Health check ────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
