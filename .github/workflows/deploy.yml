name: Build & Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/schoolledger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # ─── Checkout code ─────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─── Set up Docker Buildx ──────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ─── Login to GitHub Container Registry ────────────────────────
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ─── Build & Push Backend ──────────────────────────────────────
      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-backend:latest
            ${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─── Build & Push Frontend ─────────────────────────────────────
      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:latest
            ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─── Build & Push Landing ──────────────────────────────────────
      - name: Build & Push Landing
        uses: docker/build-push-action@v6
        with:
          context: .
          file: landingpage/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-landing:latest
            ${{ env.IMAGE_PREFIX }}-landing:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─── Copy deploy files to EC2 ──────────────────────────────────
      - name: Copy deploy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.ec2.yml,scripts/ec2-deploy.sh,docker/nginx/proxy.conf,docker/mysql/low-memory.cnf"
          target: "/home/${{ secrets.EC2_USER }}/schoolledger"
          strip_components: 0

      # ─── Deploy on EC2 ─────────────────────────────────────────────
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/schoolledger
            chmod +x scripts/ec2-deploy.sh
            bash scripts/ec2-deploy.sh
